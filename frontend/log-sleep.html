<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log Sleep - SleepWell</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: { 50: '#eef2ff', 100: '#e0e7ff', 200: '#c7d2fe', 300: '#a5b4fc', 400: '#818cf8', 500: '#6366f1', 600: '#4f46e5', 700: '#4338ca', 800: '#3730a3', 900: '#312e81', 950: '#1e1b4b' },
                        accent: { 50: '#ecfeff', 100: '#cffafe', 200: '#a5f3fc', 300: '#67e8f9', 400: '#22d3ee', 500: '#06b6d4', 600: '#0891b2', 700: '#0e7490', 800: '#155e75', 900: '#164e63', 950: '#083344' },
                        night: { 50: '#f8fafc', 100: '#f1f5f9', 200: '#e2e8f0', 300: '#cbd5e1', 400: '#94a3b8', 500: '#64748b', 600: '#475569', 700: '#334155', 800: '#1e293b', 900: '#0f172a', 950: '#020617' }
                    },
                    boxShadow: { 'glow': '0 0 20px rgba(79, 70, 229, 0.3)', 'glow-sm': '0 0 10px rgba(79, 70, 229, 0.2)', 'glow-accent': '0 0 20px rgba(6, 182, 212, 0.3)' },
                    animation: { 'fade-in': 'fade-in 0.4s ease-out forwards', 'scale-in': 'scale-in 0.3s ease-out forwards', 'slide-up': 'slide-up 0.3s ease-out forwards' },
                    keyframes: { 'fade-in': { '0%': { opacity: '0', transform: 'translateY(8px)' }, '100%': { opacity: '1', transform: 'translateY(0)' } }, 'scale-in': { '0%': { opacity: '0', transform: 'scale(0.95)' }, '100%': { opacity: '1', transform: 'scale(1)' } }, 'slide-up': { '0%': { opacity: '0', transform: 'translateY(16px)' }, '100%': { opacity: '1', transform: 'translateY(0)' } } }
                }
            }
        }
    </script>
</head>
<body class="min-h-screen bg-slate-50 dark:bg-night-950 transition-colors duration-300">
    <header class="sticky top-0 z-40 border-b border-slate-200 dark:border-night-800 bg-white/80 dark:bg-night-900/80 backdrop-blur-md">
        <div class="mx-auto max-w-6xl px-4 sm:px-6">
            <div class="flex items-center justify-between h-16">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 rounded-xl bg-gradient-to-br from-primary-500 to-accent-500 flex items-center justify-center shadow-glow-sm">
                        <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"/></svg>
                    </div>
                    <span class="text-xl font-semibold text-slate-800 dark:text-slate-100">SleepWell</span>
                </div>
                <nav class="flex items-center gap-1">
                    <button onclick="navigateTo('dashboard')" class="nav-btn px-4 py-2 rounded-lg text-sm font-medium text-slate-600 dark:text-slate-400 hover:bg-slate-100 dark:hover:bg-night-800 transition-all">Dashboard</button>
                    <button onclick="navigateTo('log')" class="nav-btn px-4 py-2 rounded-lg text-sm font-medium text-primary-600 dark:text-primary-400 bg-primary-50 dark:bg-primary-900/30 transition-all">Log</button>
                    <button onclick="navigateTo('chart')" class="nav-btn px-4 py-2 rounded-lg text-sm font-medium text-slate-600 dark:text-slate-400 hover:bg-slate-100 dark:hover:bg-night-800 transition-all">Chart</button>
                    <button onclick="navigateTo('settings')" class="nav-btn px-4 py-2 rounded-lg text-sm font-medium text-slate-600 dark:text-slate-400 hover:bg-slate-100 dark:hover:bg-night-800 transition-all">Settings</button>
                </nav>
                <button onclick="toggleDarkMode()" class="w-10 h-10 rounded-lg flex items-center justify-center text-slate-600 dark:text-slate-400 hover:bg-slate-100 dark:hover:bg-night-800 transition-all">
                    <svg class="w-5 h-5 dark:hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"/></svg>
                    <svg class="w-5 h-5 hidden dark:block" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"/></svg>
                </button>
            </div>
        </div>
    </header>

    <main class="max-w-2xl mx-auto px-4 sm:px-6 py-8">
        <div class="animate-fade-in mb-8">
            <h1 class="text-2xl font-semibold text-slate-800 dark:text-slate-100">Log Your Sleep</h1>
            <p class="text-slate-500 dark:text-slate-400 mt-1">Record your rest for last night</p>
        </div>

        <form id="sleep-form" class="space-y-6 animate-slide-up">
            <div class="bg-white dark:bg-night-900 rounded-2xl p-6 shadow-sm dark:shadow-glow-sm">
                <label class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-2">Date</label>
                <div class="relative">
                    <input type="date" id="date-input" class="w-full px-4 py-3 rounded-xl border border-slate-200 dark:border-night-700 bg-white dark:bg-night-800 text-slate-800 dark:text-slate-100 focus:ring-2 focus:ring-primary-500 focus:border-transparent transition-all">
                </div>
            </div>

            <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                <div class="bg-white dark:bg-night-900 rounded-2xl p-6 shadow-sm dark:shadow-glow-sm animate-slide-up stagger-1">
                    <label class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-2">Bedtime</label>
                    <button type="button" id="bedtime-btn" class="w-full px-4 py-3 rounded-xl border border-slate-200 dark:border-night-700 bg-white dark:bg-night-800 text-left flex items-center justify-between hover:border-primary-300 dark:hover:border-primary-600 transition-all">
                        <span id="bedtime-display" class="text-slate-800 dark:text-slate-100">--:--</span>
                        <svg class="w-5 h-5 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"/></svg>
                    </button>
                    <input type="hidden" id="bedtime-input">
                </div>

                <div class="bg-white dark:bg-night-900 rounded-2xl p-6 shadow-sm dark:shadow-glow-sm animate-slide-up stagger-2">
                    <label class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-2">Wake-up Time</label>
                    <button type="button" id="wake-btn" class="w-full px-4 py-3 rounded-xl border border-slate-200 dark:border-night-700 bg-white dark:bg-night-800 text-left flex items-center justify-between hover:border-accent-300 dark:hover:border-accent-600 transition-all">
                        <span id="wake-display" class="text-slate-800 dark:text-slate-100">--:--</span>
                        <svg class="w-5 h-5 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"/></svg>
                    </button>
                    <input type="hidden" id="wake-input">
                </div>
            </div>

            <div class="bg-gradient-to-r from-primary-50 to-accent-50 dark:from-primary-900/20 dark:to-accent-900/20 rounded-2xl p-6 border border-primary-100 dark:border-primary-800 animate-slide-up stagger-3">
                <div class="flex items-center justify-between">
                    <span class="text-sm font-medium text-slate-600 dark:text-slate-400">Sleep Duration</span>
                    <span id="duration-display" class="text-2xl font-bold text-primary-600 dark:text-primary-400">--</span>
                </div>
            </div>

            <div class="bg-white dark:bg-night-900 rounded-2xl p-6 shadow-sm dark:shadow-glow-sm animate-slide-up stagger-4">
                <label class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-2">Notes (Optional)</label>
                <textarea id="notes-input" rows="3" placeholder="How did you feel? Any factors affecting your sleep?" class="w-full px-4 py-3 rounded-xl border border-slate-200 dark:border-night-700 bg-white dark:bg-night-800 text-slate-800 dark:text-slate-100 placeholder-slate-400 focus:ring-2 focus:ring-primary-500 focus:border-transparent transition-all resize-none"></textarea>
            </div>

            <button type="submit" class="w-full py-4 rounded-xl bg-gradient-to-r from-primary-500 to-accent-500 text-white font-semibold flex items-center justify-center gap-2 shadow-glow hover:shadow-lg hover:scale-[1.02] active:scale-[0.98] transition-all duration-200 animate-slide-up stagger-5">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"/></svg>
                Save Sleep Log
            </button>
        </form>
    </main>

    <div id="clock-modal" class="fixed inset-0 z-50 hidden">
        <div class="absolute inset-0 bg-black/50 backdrop-blur-sm" onclick="closeClockModal()"></div>
        <div class="absolute inset-0 flex items-center justify-center p-4">
            <div class="bg-white dark:bg-night-900 rounded-3xl p-6 shadow-2xl max-w-sm w-full animate-scale-in">
                <div class="flex justify-center mb-4">
                    <canvas id="clock-canvas" width="240" height="240" class="cursor-pointer"></canvas>
                </div>
                
                <div class="flex justify-center gap-4 mb-6">
                    <button type="button" id="am-btn" class="px-6 py-2 rounded-xl font-medium transition-all bg-primary-100 dark:bg-primary-800 text-primary-600 dark:text-primary-300">AM</button>
                    <button type="button" id="pm-btn" class="px-6 py-2 rounded-xl font-medium transition-all text-slate-500 dark:text-slate-400 hover:bg-slate-100 dark:hover:bg-night-800">PM</button>
                </div>

                <div class="flex gap-3">
                    <button type="button" onclick="closeClockModal()" class="flex-1 py-3 rounded-xl border border-slate-200 dark:border-night-700 text-slate-600 dark:text-slate-300 font-medium hover:bg-slate-50 dark:hover:bg-night-800 transition-all">Cancel</button>
                    <button type="button" id="confirm-time-btn" class="flex-1 py-3 rounded-xl bg-primary-500 text-white font-medium hover:bg-primary-600 transition-all">Confirm</button>
                </div>
            </div>
        </div>
    </div>

    <script src="log-sleep.js"></script>
</body>
</html>
