<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sleep Chart - SleepWell</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: { 50: '#eef2ff', 100: '#e0e7ff', 200: '#c7d2fe', 300: '#a5b4fc', 400: '#818cf8', 500: '#6366f1', 600: '#4f46e5', 700: '#4338ca', 800: '#3730a3', 900: '#312e81', 950: '#1e1b4b' },
                        accent: { 50: '#ecfeff', 100: '#cffafe', 200: '#a5f3fc', 300: '#67e8f9', 400: '#22d3ee', 500: '#06b6d4', 600: '#0891b2', 700: '#0e7490', 800: '#155e75', 900: '#164e63', 950: '#083344' },
                        night: { 50: '#f8fafc', 100: '#f1f5f9', 200: '#e2e8f0', 300: '#cbd5e1', 400: '#94a3b8', 500: '#64748b', 600: '#475569', 700: '#334155', 800: '#1e293b', 900: '#0f172a', 950: '#020617' }
                    },
                    boxShadow: { 'glow': '0 0 20px rgba(79, 70, 229, 0.3)', 'glow-sm': '0 0 10px rgba(79, 70, 229, 0.2)', 'glow-accent': '0 0 20px rgba(6, 182, 212, 0.3)' },
                    animation: { 'fade-in': 'fade-in 0.4s ease-out forwards', 'slide-up': 'slide-up 0.3s ease-out forwards' },
                    keyframes: { 'fade-in': { '0%': { opacity: '0', transform: 'translateY(8px)' }, '100%': { opacity: '1', transform: 'translateY(0)' } }, 'slide-up': { '0%': { opacity: '0', transform: 'translateY(16px)' }, '100%': { opacity: '1', transform: 'translateY(0)' } } }
                }
            }
        }
    </script>
</head>
<body class="min-h-screen bg-slate-50 dark:bg-night-950 transition-colors duration-300">
    <header class="sticky top-0 z-40 border-b border-slate-200 dark:border-night-800 bg-white/80 dark:bg-night-900/80 backdrop-blur-md">
        <div class="mx-auto max-w-6xl px-4 sm:px-6">
            <div class="flex items-center justify-between h-16">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 rounded-xl bg-gradient-to-br from-primary-500 to-accent-500 flex items-center justify-center shadow-glow-sm">
                        <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"/></svg>
                    </div>
                    <span class="text-xl font-semibold text-slate-800 dark:text-slate-100">SleepWell</span>
                </div>
                <nav class="flex items-center gap-1">
                    <button onclick="navigateTo('dashboard')" class="nav-btn px-4 py-2 rounded-lg text-sm font-medium text-slate-600 dark:text-slate-400 hover:bg-slate-100 dark:hover:bg-night-800 transition-all">Dashboard</button>
                    <button onclick="navigateTo('log')" class="nav-btn px-4 py-2 rounded-lg text-sm font-medium text-slate-600 dark:text-slate-400 hover:bg-slate-100 dark:hover:bg-night-800 transition-all">Log</button>
                    <button onclick="navigateTo('chart')" class="nav-btn px-4 py-2 rounded-lg text-sm font-medium text-primary-600 dark:text-primary-400 bg-primary-50 dark:bg-primary-900/30 transition-all">Chart</button>
                    <button onclick="navigateTo('settings')" class="nav-btn px-4 py-2 rounded-lg text-sm font-medium text-slate-600 dark:text-slate-400 hover:bg-slate-100 dark:hover:bg-night-800 transition-all">Settings</button>
                </nav>
                <button onclick="toggleDarkMode()" class="w-10 h-10 rounded-lg flex items-center justify-center text-slate-600 dark:text-slate-400 hover:bg-slate-100 dark:hover:bg-night-800 transition-all">
                    <svg class="w-5 h-5 dark:hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"/></svg>
                    <svg class="w-5 h-5 hidden dark:block" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"/></svg>
                </button>
            </div>
        </div>
    </header>

    <main class="max-w-6xl mx-auto px-4 sm:px-6 py-8">
        <div class="animate-fade-in mb-6">
            <h1 class="text-2xl font-semibold text-slate-800 dark:text-slate-100">Sleep Chart</h1>
            <p class="text-slate-500 dark:text-slate-400 mt-1">Visualize your sleep patterns over time</p>
        </div>

        <div class="bg-white dark:bg-night-900 rounded-2xl p-6 shadow-sm dark:shadow-glow-sm animate-slide-up">
            <div class="flex items-center justify-between mb-6">
                <div class="inline-flex bg-slate-100 dark:bg-night-800 rounded-xl p-1">
                    <button onclick="switchPeriod(7)" id="btn-7" class="period-btn px-4 py-2 rounded-lg text-sm font-medium text-primary-600 dark:text-primary-400 bg-white dark:bg-night-700 shadow-sm transition-all">7 Days</button>
                    <button onclick="switchPeriod(14)" id="btn-14" class="period-btn px-4 py-2 rounded-lg text-sm font-medium text-slate-600 dark:text-slate-400 hover:text-slate-800 dark:hover:text-slate-200 transition-all">14 Days</button>
                    <button onclick="switchPeriod(30)" id="btn-30" class="period-btn px-4 py-2 rounded-lg text-sm font-medium text-slate-600 dark:text-slate-400 hover:text-slate-800 dark:hover:text-slate-200 transition-all">30 Days</button>
                </div>
                <button onclick="exportChart()" class="text-sm text-primary-600 dark:text-primary-400 hover:text-primary-700 dark:hover:text-primary-300 flex items-center gap-2">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/></svg>
                    Export
                </button>
            </div>

            <div class="relative">
                <canvas id="chart-canvas" class="w-full h-80 rounded-xl"></canvas>
                <div id="tooltip" class="absolute hidden bg-slate-800 dark:bg-slate-900 text-white text-sm rounded-lg px-3 py-2 shadow-xl pointer-events-none z-10">
                    <div id="tooltip-date" class="font-semibold mb-1"></div>
                    <div id="tooltip-details" class="space-y-1"></div>
                </div>
                <div id="loading" class="absolute inset-0 flex items-center justify-center bg-white/50 dark:bg-night-900/50 rounded-xl">
                    <div class="animate-spin rounded-full h-8 w-8 border-b-2 border-primary-600"></div>
                </div>
            </div>

            <div class="flex items-center justify-center gap-6 mt-6 pt-4 border-t border-slate-100 dark:border-night-800">
                <div class="flex items-center gap-2">
                    <div class="w-3 h-3 rounded-full bg-[#4ADE80]"></div>
                    <span class="text-xs text-slate-600 dark:text-slate-400">Goal Met</span>
                </div>
                <div class="flex items-center gap-2">
                    <div class="w-3 h-3 rounded-full bg-[#FACC15]"></div>
                    <span class="text-xs text-slate-600 dark:text-slate-400">±30min</span>
                </div>
                <div class="flex items-center gap-2">
                    <div class="w-3 h-3 rounded-full bg-[#FB923C]"></div>
                    <span class="text-xs text-slate-600 dark:text-slate-400">-30 to 60min</span>
                </div>
                <div class="flex items-center gap-2">
                    <div class="w-3 h-3 rounded-full bg-[#F87171]"></div>
                    <span class="text-xs text-slate-600 dark:text-slate-400">&lt; -60min</span>
                </div>
                <div class="flex items-center gap-2">
                    <div class="w-3 h-3 rounded-full border-2 border-dashed border-slate-300 dark:border-slate-600"></div>
                    <span class="text-xs text-slate-600 dark:text-slate-400">No Data</span>
                </div>
            </div>
        </div>
    </main>
    <script src="chart.js"></script>
</body>
</html>
